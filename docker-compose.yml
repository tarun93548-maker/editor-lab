version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REMOTION_SERVICE_URL=http://remotion:3100
    depends_on:
      - remotion
    volumes:
      - ./jobs_data:/app/jobs_data

  remotion:
    build: ./remotion-service
    ports:
      - "3100:3100"
    env_file: ./remotion-service/.env
